name: Wohnungs-Watcher

on:
  schedule:
    # Alle 5 Minuten (UTC). 5 Min ist das praktische Minimum bei GitHub Actions;
    # bei hoher Last kann der Start etwas spaeter erfolgen. WICHTIG: Bei einem
    # PRIVATEN Repo verbraucht das mehr als die 2.000 Gratis-Minuten/Monat
    # (siehe README, Abschnitt Kosten) -> dann besser ein oeffentliches Repo
    # (Actions dort unbegrenzt gratis) oder ein groesseres Intervall (z. B. */30).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}       # erlaubt manuellen Start ueber den Actions-Tab

# Erlaubt dem Job, den aktualisierten State zurueck ins Repo zu committen.
permissions:
  contents: write

# Verhindert ueberlappende Laeufe, falls ein Lauf laenger dauert.
concurrency:
  group: wohnungs-watcher
  cancel-in-progress: false

jobs:
  check-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Watcher ausfuehren
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Optional: nur noetig fuer die automatischen Status-Reaktionen.
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
        run: python main.py

      - name: State zurueck ins Repo committen
        run: |
          git config user.name "wohnungs-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.db logs/watcher.log
          git diff --staged --quiet || git commit -m "State-Update [skip ci]"
          git push
