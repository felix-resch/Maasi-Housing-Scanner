# Zentrale Konfiguration des Wohnungs-Watchers.
# Die Discord-Webhook-URL steht NICHT hier, sondern als Umgebungsvariable
# DISCORD_WEBHOOK_URL (lokal in .env, auf GitHub als Actions-Secret).
discord_webhook_url: "ENV:DISCORD_WEBHOOK_URL"

# Poll-Intervall in Minuten - nur relevant, wenn main.py mit --loop lokal
# laeuft. Bei GitHub Actions uebernimmt der cron-Zeitplan das Scheduling.
poll_interval_minutes: 10

# Pfad zur SQLite-State-Datei (relativ zum Projektordner).
state_db: "state.db"

# Bewerbungstext, der jeder Discord-Meldung als kopierbarer Block beigelegt
# wird - IMMER in Englisch UND Niederlaendisch. Je nach erkannter Wohnung wird
# automatisch die passende Variante gewaehlt:
#   - "shared": Objekt mit >= min_bedrooms_for_shared Schlafzimmern (eigene WG
#     mit Freund:in moeglich)
#   - "single": Einzelzimmer, Studio oder 1-Schlafzimmer-Wohnung
# Platzhalter {title} wird eingesetzt (der Preis steht bereits oben im Embed und
# wird im Text bewusst nicht wiederholt). Jede logische Zeile steht auf EINER
# Zeile; Discord bricht selbst um.
# Automatische Status-Reaktionen an jede Meldung (zum Anklicken).
# WICHTIG: Reaktionen kann nur ein Discord-BOT setzen, kein Webhook. Dafuer muss
# die Umgebungsvariable DISCORD_BOT_TOKEN gesetzt sein UND der Bot im Server mit
# dem Recht "Add Reactions" (Reaktionen hinzufuegen) sein. Ohne Token werden die
# Reaktionen einfach uebersprungen - die Meldung selbst kommt trotzdem an.
reactions:
  enabled: true
  # legend: true -> Emoji + Bedeutung werden zusaetzlich als Zeile in die
  # Meldung geschrieben. Die tatsaechliche ANZAHL der Reaktionen zeigt Discord
  # automatisch unter jeder Reaktion an (das kann kein Embed-Text leisten).
  legend: true
  items:
    - emoji: "✅"
      label: "beworben"
    - emoji: "❌"
      label: "nicht bewerben"
    - emoji: "❓"
      label: "unsicher"
    - emoji: "⏰"
      label: "noch bewerben"

# Bewerbungstexte werden aktuell NICHT an die Meldung gehaengt (enabled: false).
# Die Texte bleiben hier stehen, falls du sie spaeter wieder aktivieren willst.
application:
  enabled: false
  min_bedrooms_for_shared: 2

  single:
    en: |
      Dear Landlord,

      I am an incoming master's student at SBE from Germany, currently looking for accommodation.

      My name is Felix Resch (22 years old), and I enjoy cycling, running, and going to the gym.

      I have already lived in Düsseldorf, Koblenz, and Frankfurt (all in Germany), as well as in Brescia, Italy, as part of my studies and internships.

      Your room would suit my needs perfectly! A parental guarantee can be provided if required.

      Kind regards,
      Felix Resch
    nl: |
      Geachte verhuurder,

      Ik ben een aankomend masterstudent aan SBE uit Duitsland en momenteel op zoek naar woonruimte.

      Mijn naam is Felix Resch (22 jaar oud), en ik houd van fietsen, hardlopen en naar de sportschool gaan.

      Ik heb al gewoond in Düsseldorf, Koblenz en Frankfurt (allemaal in Duitsland), evenals in Brescia, Italië, in het kader van mijn studie en stages.

      Uw kamer zou perfect aansluiten bij mijn wensen! Een ouderlijke garantstelling kan indien nodig worden verstrekt.

      Met vriendelijke groet,
      Felix Resch

  shared:
    en: |
      Dear Landlord,

      We are two close friends and students (Jonas, 23 & Felix, 22) from Germany, starting our Master's degrees at SBE this September.

      We have already lived in Koblenz, Düsseldorf, Frankfurt (all in Germany) as well as in Brescia, Italy, and Vance, Alabama, USA.

      Your property looks like the ideal place for us to share. A parental guarantee can be provided if required.

      Kind regards,
      Jonas Esper & Felix Resch
    nl: |
      Geachte verhuurder,

      Wij zijn twee goede vrienden en studenten (Jonas, 23 & Felix, 22) uit Duitsland en beginnen dit september aan onze masteropleiding aan SBE.

      Wij hebben al gewoond in Koblenz, Düsseldorf en Frankfurt (allemaal in Duitsland), evenals in Brescia, Italië, en Vance, Alabama, VS.

      Uw woning lijkt de ideale plek voor ons om samen te delen. Een ouderlijke garantstelling kan indien nodig worden verstrekt.

      Met vriendelijke groet,
      Jonas Esper & Felix Resch

sources:
  - name: huurwoningen
    enabled: true
    type: static_html
    # Vorgefilterte Such-URL. Hier kann direkt nach Objekttyp/Preis gefiltert
    # werden, z. B. .../en/in/maastricht/?price=450-650 - dann muss das Tool
    # selbst keine Preis-/Zimmerlogik nachbauen.
    url: "https://www.huurwoningen.nl/en/in/maastricht/"
    # Wie viele Ergebnisseiten pro Lauf abgefragt werden. Neue Inserate
    # erscheinen oben auf Seite 1, daher reicht 1 (ggf. 2 als Puffer).
    pages: 1

  - name: kamernet
    enabled: true
    # Next.js-Seite, Daten stehen als JSON im HTML (__NEXT_DATA__).
    # requests reicht, kein Cloudflare. Vor allem Zimmer/Studios (studenten-
    # relevant). "properties-<stadt>" umfasst alle Typen.
    type: static_html
    url: "https://kamernet.nl/en/for-rent/properties-maastricht"
    cities:
      - Maastricht

  - name: mghousing
    enabled: true
    # Die Seite rendert clientseitig, liefert die Daten aber ueber eine
    # oeffentliche JSON-API (Payload CMS) - kein Playwright noetig.
    type: api
    url: "https://mghousing.nl/api/listings"
    # Nur Mietobjekte melden (Kauf ignorieren).
    only_rentals: true
    # Nur verfuegbare Objekte melden (vermietete/reservierte ignorieren).
    only_available: true
    # Nur diese Staedte melden. Leere Liste = keine Ortsfilterung.
    cities:
      - Maastricht

  - name: wmm
    enabled: true
    # Woningmakelaardij Maastricht - serverseitig gerendertes HTML.
    type: static_html
    url: "https://wmm.nl/en/offers"

  - name: maasland
    enabled: true
    # Maasland Relocation - alle Angebote unter /en/properties (HTML).
    type: static_html
    url: "https://maaslandrelocation.nl/en/properties"

  - name: immoweb
    enabled: true
    # Belgische Grenzgemeinden bei Maastricht, per SERVER-seitigem PLZ-Filter
    # (postalCodes) - das filtert zuverlaessig, anders als das gezeichnete
    # Polygon (das immoweb nur im Browser per JS anwendet, nicht im HTML).
    # PLZ anpassen, um das Gebiet zu aendern:
    #   3620 Lanaken · 3630 Maasmechelen · 3690 Zutendaal · 3740 Bilzen
    #   3770 Riemst · 3798 Voeren · 4600 Visé (BE-Wallonie, direkt suedlich)
    type: static_html
    url: "https://www.immoweb.be/en/search/apartment/for-rent?countries=BE&postalCodes=3620,3630,3690,3740,3770,3798,4600&orderBy=newest"
    # Zusaetzlicher Ortsfilter nicht noetig (PLZ filtert schon serverseitig).
    cities: []
